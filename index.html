<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Documentation</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 3rem 1rem;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        .documentation-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }

        .column-header {
            font-size: 1.75rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 3px solid var(--primary-color);
            color: var(--text-main);
        }

        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            min-height: 200px;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-color);
        }

        .card h3 {
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
            color: var(--text-main);
            font-weight: 700;
            min-height: 3rem;
        }

        .card p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            flex-grow: 1;
            font-size: 0.95rem;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            background-color: var(--primary-color);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background-color 0.2s;
            width: fit-content;
            cursor: pointer;
            border: none;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        footer {
            text-align: center;
            padding: 3rem 1rem;
            margin-top: 4rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
        }

        /* ==========================================
           MODAL & MARKDOWN VIEWER STYLES
           ========================================== */
        .modal-overlay {
            display: none;
            /* Hidden by default */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.75);
            /* Dark blur overlay */
            z-index: 1000;
            overflow-y: auto;
            padding: 2rem 1rem;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: var(--card-bg);
            max-width: 900px;
            margin: 0 auto;
            padding: 2.5rem;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: #f1f5f9;
            border: none;
            font-size: 1.5rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: #e2e8f0;
            color: var(--text-main);
        }

        /* Beautiful Markdown Styling */
        .markdown-body {
            color: var(--text-main);
            font-size: 1.05rem;
        }

        .markdown-body h1 {
            font-size: 2.2rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .markdown-body h2 {
            font-size: 1.8rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.3rem;
        }

        .markdown-body h3 {
            font-size: 1.4rem;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }

        .markdown-body p {
            margin-bottom: 1.2rem;
        }

        .markdown-body ul,
        .markdown-body ol {
            margin-bottom: 1.2rem;
            padding-left: 2rem;
        }

        .markdown-body li {
            margin-bottom: 0.5rem;
        }

        /* Code blocks styling */
        .markdown-body pre {
            background: #1e293b;
            color: #f8fafc;
            padding: 1.2rem;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }

        .markdown-body code {
            background: #f1f5f9;
            color: #db2777;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }

        .markdown-body pre code {
            background: none;
            color: inherit;
            padding: 0;
        }

        .markdown-body img {
            max-width: 100%;
            border-radius: 8px;
            margin: 1.5rem 0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .markdown-body blockquote {
            border-left: 4px solid var(--primary-color);
            padding: 1rem 1.5rem;
            color: var(--text-secondary);
            background: #f8fafc;
            margin: 1.5rem 0;
            border-radius: 0 8px 8px 0;
        }

        @media (max-width: 768px) {
            .documentation-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .modal-content {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Documentation Hub</h1>
        <p>Computer Vision Baseline Modules</p>
    </header>

    <div class="container">
        <div class="documentation-grid">

            <section>
                <h2 class="column-header">Suspicious Activity Detection</h2>
                <div id="suspicious-activity-container" class="cards-container"></div>
            </section>

            <section>
                <h2 class="column-header">Person Re-Identification</h2>
                <div id="person-reid-container" class="cards-container"></div>
            </section>

        </div>
    </div>

    <div id="document-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()" title="Close">&times;</button>
            <div id="markdown-viewer" class="markdown-body">
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION: ADD YOUR FILES HERE
        // ==========================================
        const documentationFiles = [
            {
                category: 'person-reid',
                path: './person-reid/Person_reID_baseline_pytorch-master.md'
            }
            // Add more files here as you create them.
        ];

        // ==========================================
        // FUNCTION: Extract Title Only
        // ==========================================
        function parseMarkdownTitle(content) {
            const lines = content.split('\n');
            for (let line of lines) {
                const trimmed = line.trim();
                if (trimmed.startsWith('# ') || trimmed.startsWith('## ')) {
                    return trimmed.replace(/^#+\s*/, '');
                }
            }
            return null;
        }

        // ==========================================
        // FUNCTION: Fetch and Create Card
        // ==========================================
        async function createCard(file, container) {
            let filename = file.path.split('/').pop().replace('.md', '');
            filename = filename.replace(/[-_]/g, ' ');

            const card = document.createElement('div');
            card.className = 'card';

            // Notice we changed the <a> tag to a <button> that triggers openDocument()
            card.innerHTML = `
                <h3>${filename}</h3>
                <p style="color: #10b981; font-weight: 600; font-size: 0.95rem;">✓ Status: Code run successful</p>
                <div>
                    <button onclick="openDocument('${file.path}')" class="btn">View Documentation</button>
                </div>
            `;
            container.appendChild(card);

            try {
                const response = await fetch(file.path);
                if (response.ok) {
                    const content = await response.text();
                    const title = parseMarkdownTitle(content);
                    if (title) {
                        card.querySelector('h3').textContent = title;
                    }
                }
            } catch (error) {
                console.warn(`Could not fetch ${file.path} for title extraction.`);
            }
        }

        // ==========================================
        // FUNCTION: Open and Render Markdown in Modal
        // ==========================================
        async function openDocument(path) {
            const modal = document.getElementById('document-modal');
            const viewer = document.getElementById('markdown-viewer');

            // Show modal with a loading state
            viewer.innerHTML = '<h2>Loading document...</h2><p>Please wait.</p>';
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden'; // Stop background scrolling

            try {
                const response = await fetch(path);
                if (response.ok) {
                    const markdownText = await response.text();
                    // Magic happens here: marked.parse() turns Markdown into HTML
                    viewer.innerHTML = marked.parse(markdownText);
                } else {
                    viewer.innerHTML = `<h2>Error 404</h2><p>Could not find the document at <code>${path}</code>.</p>`;
                }
            } catch (error) {
                viewer.innerHTML = `<h2>Network Error</h2><p>Failed to load the document. Ensure you are running this via a local server (like Live Server) and not directly from the file system.</p>`;
            }
        }

        // ==========================================
        // FUNCTION: Close Modal
        // ==========================================
        function closeModal() {
            document.getElementById('document-modal').style.display = 'none';
            document.body.style.overflow = 'auto'; // Restore background scrolling
        }

        // Close modal if user clicks on the dark background overlay
        window.onclick = function (event) {
            const modal = document.getElementById('document-modal');
            if (event.target == modal) {
                closeModal();
            }
        }

        // ==========================================
        // INITIALIZE
        // ==========================================
        document.addEventListener("DOMContentLoaded", function () {
            documentationFiles.forEach(file => {
                const container = document.getElementById(`${file.category}-container`);
                if (container) {
                    createCard(file, container);
                }
            });
        });
    </script>

</body>

</html>
